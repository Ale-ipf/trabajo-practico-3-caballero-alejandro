<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson - Buscador de Personajes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark navbar-simpsons">
      <div class="container">
        <span class="navbar-brand mb-0 h1">🍩 Los Simpson - Personajes</span>
      </div>
    </nav>

    <main class="container my-4">
      <section class="mb-4">
        <form id="form-buscador" class="row g-2 justify-content-center">
          <div class="col-12 col-md-6">
            <input
              type="text"
              id="input-buscador"
              class="form-control"
              placeholder="Buscar personaje por nombre (ej: Homer)"
              autocomplete="off"
            />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-warning">Buscar</button>
          </div>
          <div class="col-auto">
            <button
              type="button"
              id="btn-limpiar-busqueda"
              class="btn btn-outline-secondary"
            >
              Ver todos
            </button>
          </div>
        </form>
        <div id="mensaje-busqueda" class="text-center mt-3 d-none"></div>
      </section>

      <div id="spinner-carga" class="text-center my-5">
        <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2">Cargando personajes...</p>
      </div>

      <section id="contenedor-tarjetas" class="row"></section>
    </main>

    <div
      class="modal fade"
      id="modalDetalle"
      tabindex="-1"
      aria-labelledby="modalDetalleLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header modal-header-simpsons">
            <h5 class="modal-title" id="modalDetalleLabel">
              Detalle del personaje
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body" id="modal-body-contenido"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
