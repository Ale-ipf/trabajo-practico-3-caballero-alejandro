<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpsons</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark navbar-simpsons">
      <div class="container">
        <span class="navbar-brand mb-0 h1">🍩 Los Simpson - Personajes</span>
      </div>
    </nav>

    <main class="container my-4">
      <section class="mb-4">
        <form id="form-buscador" class="row g-2 justify-content-center">
          <div class="col-12 col-md-6">
            <input
              type="text"
              id="input-buscador"
              class="form-control"
              placeholder="Buscar personaje por nombre (ej: Homero Simpson)"
              autocomplete="off"
            />
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-warning">Buscar</button>
          </div>
          <div class="col-auto">
            <button
              type="button"
              id="btn-limpiar-busqueda"
              class="btn btn-outline-secondary"
            >
              Ver todos
            </button>
          </div>
        </form>

        <div id="mensaje-busqueda" class="text-center mt-3 d-none"></div>
      </section>

      <section id="contenedor-tarjetas" class="row"></section>
    </main>

    <div
      class="modal fade"
      id="modalDetalle"
      tabindex="-1"
      aria-labelledby="modalDetalleLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header modal-header-simpsons">
            <h5 class="modal-title" id="modalDetalleLabel">
              Detalle del personaje
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body" id="modal-body-contenido">
            <!-- Contenido generado dinámicamente por JS -->
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
